steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--build-arg', 'NEXT_PUBLIC_SUPABASE_URL=$_SUPABASE_URL',
      '--build-arg', 'NEXT_PUBLIC_SUPABASE_ANON_KEY=$_SUPABASE_ANON_KEY',
      '-t', 'gcr.io/$PROJECT_ID/silicon-boardroom',
      '.'
    ]

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/silicon-boardroom']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'silicon-boardroom'
      - '--image'
      - 'gcr.io/$PROJECT_ID/silicon-boardroom'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NEXT_PUBLIC_SUPABASE_URL=$_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY=$_SUPABASE_ANON_KEY'

images:
  - 'gcr.io/$PROJECT_ID/silicon-boardroom'

options:
  logging: CLOUD_LOGGING_ONLY
